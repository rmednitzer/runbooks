# Pre-commit hooks for runbooks (shell scripts).
#
# Install once:    pip install pre-commit && pre-commit install
# Run on all files: pre-commit run --all-files
#
# CI mirrors this configuration via .github/workflows/lint.yml.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        # -x follows `source`d files. --enable=all surfaces the optional
        # info-level checks (SC2310 set-e-in-conditionals, SC2312 masked
        # returns, SC2249 missing default case) so the "shellcheck-clean"
        # claim is honest. Deliberate set-e-disabling-in-if sites carry a
        # targeted `# shellcheck disable=SC2310` annotation in-script.
        args: [-x, --enable=all]

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        args: [-i, "2", -ci, -sr, -d]

  - repo: https://github.com/editorconfig-checker/editorconfig-checker.python
    rev: 3.6.1
    hooks:
      - id: editorconfig-checker
        alias: ec
        exclude: ^LICENSE$
