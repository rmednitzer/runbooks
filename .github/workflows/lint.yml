name: lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  pre-commit:
    name: pre-commit (shellcheck + shfmt + hygiene)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # All shellcheck / shfmt / EditorConfig / hygiene checks are driven
      # by .pre-commit-config.yaml — the single source of truth for tool
      # versions and arguments.
      - uses: pre-commit/action@v3.0.1
