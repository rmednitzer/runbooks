name: lint

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck version
        run: shellcheck --version

      - name: bash syntax check
        run: find . -type f -name '*.sh' -print -exec bash -n {} +

      - name: shellcheck
        run: find . -type f -name '*.sh' -print -exec shellcheck --severity=warning {} +
