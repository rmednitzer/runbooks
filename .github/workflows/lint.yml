name: lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: pre-commit (shellcheck + shfmt + hygiene)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"

      # All shellcheck / shfmt / EditorConfig / hygiene checks are driven
      # by .pre-commit-config.yaml — the single source of truth for tool
      # versions and arguments. pre-commit is invoked directly rather than
      # via the pre-commit/action marketplace wrapper: that action is
      # abandoned upstream (last release 2024-02; flagged by Renovate). The
      # three steps below reproduce what the wrapper did internally —
      # install pre-commit, cache the hook environments under
      # ~/.cache/pre-commit (same cache key shape), and run all hooks —
      # matching the prefer-upstream posture of the bats job below.
      - name: Install pre-commit
        run: python -m pip install pre-commit

      - name: Cache pre-commit hook environments
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-3|${{ env.pythonLocation }}|${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit (all files)
        run: pre-commit run --all-files --show-diff-on-failure --color=always

  bats:
    name: bats (script behaviour tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      # Install bats-core from upstream rather than a third-party marketplace
      # action. Pin to the exact commit and VERIFY it: a tag like v1.13.0 can
      # be moved, so we check out the tag for readability but fail if its SHA
      # is not the expected immutable commit.
      - name: Install bats-core
        run: |
          set -euo pipefail
          git clone --depth 1 --branch v1.13.0 \
            https://github.com/bats-core/bats-core /tmp/bats-core
          expected=3bca150ec86275d6d9d5a4fd7d48ab8b6c6f3d87
          actual="$(git -C /tmp/bats-core rev-parse HEAD)"
          if [ "${actual}" != "${expected}" ]; then
            echo "bats-core v1.13.0 SHA mismatch: got ${actual}, want ${expected}" >&2
            exit 1
          fi
          sudo /tmp/bats-core/install.sh /usr/local

      # Run as root: several scripts (aide-acknowledge.sh, extend-lvm.sh,
      # journal-vacuum.sh) gate on EUID == 0, and GitHub-hosted runners
      # provide passwordless sudo. The fake-binary PATH shims the tests set up
      # work the same under root.
      - name: Run bats suite
        run: sudo --preserve-env=PATH bats tests/

  secret-scan:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      # The gitleaks pre-commit hook scans only STAGED changes, so it is a
      # no-op in a clean CI checkout (pass_filenames is false; `gitleaks git
      # --pre-commit --staged` finds nothing to scan). This job is what
      # actually enforces secret detection server-side: a full working-tree
      # scan via `gitleaks dir`. Pinned by immutable image DIGEST (matching the
      # SHA-pinning posture of the actions above); the digest is gitleaks
      # v8.30.1 — the same version as the pre-commit hook and the companion
      # repos. Bump the digest and the version comment together.
      - name: Run gitleaks (full working-tree scan)
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f \
            dir /repo --redact --no-banner # gitleaks v8.30.1
